# Prometheus scrape configuration for Triton Inference Server

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "triton_rules.yml"

scrape_configs:
  - job_name: "triton-inference-server"
    metrics_path: /metrics
    static_configs:
      - targets: ["triton-server:8002"]
        labels:
          service: triton
          environment: prod

