# ============================================================
# Staging 환경 오버라이드
# 사용: helm install triton deploy/helm/triton -f deploy/helm/triton/values.staging.yaml
# ============================================================

replicaCount: 2

tritonArgs:
  - --model-repository=/models
  - --strict-model-config=true
  - --allow-metrics=true
  - --allow-gpu-metrics=true
  - --model-control-mode=explicit      # 명시적 로드만 허용
  - --log-verbose=1

resources:
  requests:
    cpu: "2"
    memory: "8Gi"
    nvidia.com/gpu: "1"
  limits:
    cpu: "4"
    memory: "16Gi"
    nvidia.com/gpu: "1"

autoscaling:
  enabled: false

pdb:
  enabled: true
  minAvailable: 1
