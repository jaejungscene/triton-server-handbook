apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: triton-ingress
  annotations:
    # nginx Ingress Controller 기준 (클러스터 환경에 따라 변경)
    kubernetes.io/ingress.class: "nginx"
    # gRPC 트래픽 허용 (HTTP/2 필수)
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    nginx.ingress.kubernetes.io/http2-push-preload: "true"
    # 요청 타임아웃 (LLM 스트리밍 등 장시간 응답 고려)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
    # HTTP/REST 엔드포인트 (포트 8000)
    - host: triton.example.com        # 실제 도메인으로 교체
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: triton          # service.yaml의 name과 일치
                port:
                  number: 8000

    # gRPC 엔드포인트 (포트 8001) — 별도 호스트 또는 별도 Ingress 권장
    # gRPC는 HTTP/2 전용이라 HTTP/REST와 같은 호스트 사용 시 충돌 가능
    - host: triton-grpc.example.com   # 실제 도메인으로 교체
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: triton
                port:
                  number: 8001

  # TLS 설정 (prod overlay의 ingress_patch.yaml에서 override)
  # tls:
  #   - hosts:
  #       - triton.example.com
  #       - triton-grpc.example.com
  #     secretName: triton-tls-secret   # deploy/k8s/base/secret-template.yaml 참고
