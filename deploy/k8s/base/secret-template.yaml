# ============================================================
# K8s Secret 관리 템플릿
#
# ⚠️  이 파일은 템플릿입니다. 실제 값을 절대 Git에 커밋하지 마세요.
#
# 권장 관리 방식 (우선순위 순):
#   1. Sealed Secrets / External Secrets Operator (운영 권장)
#   2. kubectl create secret + CI/CD 환경변수로 주입
#   3. Vault + Vault Agent Injector
#
# 빠른 생성 예시:
#   kubectl create secret generic triton-cloud-credentials \
#     --from-literal=AWS_ACCESS_KEY_ID=AKIAXXXXXXXX \
#     --from-literal=AWS_SECRET_ACCESS_KEY=XXXXXXXX \
#     --from-literal=AWS_DEFAULT_REGION=ap-northeast-2
#
#   kubectl create secret tls triton-tls-secret \
#     --cert=path/to/tls.crt \
#     --key=path/to/tls.key
# ============================================================

# ---
# 1. 클라우드 모델 저장소 인증 (S3 / GCS / Azure)
# ---
apiVersion: v1
kind: Secret
metadata:
  name: triton-cloud-credentials
type: Opaque
stringData:
  # AWS S3 (configs/repository/s3.txt 와 함께 사용)
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"
  AWS_DEFAULT_REGION: "ap-northeast-2"

  # Google Cloud Storage (configs/repository/gcs.txt 와 함께 사용)
  # GOOGLE_APPLICATION_CREDENTIALS 대신 서비스 계정 JSON 파일 마운트 권장
  # GCS_BUCKET: "gs://my-model-bucket"

  # Azure Blob Storage (configs/repository/azure.txt 와 함께 사용)
  # AZURE_STORAGE_ACCOUNT: "REPLACE_ME"
  # AZURE_STORAGE_KEY: "REPLACE_ME"

---
# 2. TLS 인증서 (deploy/k8s/base/ingress.yaml, configs/tls/ 와 함께 사용)
# kubectl create secret tls triton-tls-secret --cert=tls.crt --key=tls.key 로 생성 권장
apiVersion: v1
kind: Secret
metadata:
  name: triton-tls-secret
type: kubernetes.io/tls
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_ACTUAL_CERT
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_ACTUAL_KEY
    -----END PRIVATE KEY-----

---
# ============================================================
# Deployment에서 Secret 주입하는 방법
#
# 방법 A — 환경변수로 주입 (S3 credentials)
#   envFrom:
#     - secretRef:
#         name: triton-cloud-credentials
#
# 방법 B — 파일로 마운트 (GCS JSON 키)
#   volumes:
#     - name: gcs-key
#       secret:
#         secretName: triton-cloud-credentials
#   volumeMounts:
#     - name: gcs-key
#       mountPath: /secrets/gcs
#       readOnly: true
# ============================================================
