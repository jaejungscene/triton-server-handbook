# prod 환경 Ingress 패치 — TLS 활성화 + 실제 도메인 적용
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: triton-ingress
  annotations:
    # cert-manager 자동 인증서 발급 (cert-manager 설치 시 활성화)
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - triton.example.com          # 실제 도메인으로 교체
        - triton-grpc.example.com     # 실제 도메인으로 교체
      secretName: triton-tls-secret   # secret-template.yaml로 생성한 Secret 이름
  rules:
    - host: triton.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: triton
                port:
                  number: 8000
    - host: triton-grpc.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: triton
                port:
                  number: 8001
